# render.yaml

services:
  # =========================
  # Backend Service
  # =========================
  - type: web
    name: wbd-eventweb-backend
    env: docker

    repo: https://github.com/Harshavardhan0909/Event-Management-Platform
    branch: main

    dockerfilePath: ./backend/Dockerfile

    envVars:
      # MongoDB Atlas URI
      - key: MONGODB_URI
        value: mongodb+srv://USERNAME:PASSWORD@eventweb.lgw5ogt.mongodb.net/EventWeb?retryWrites=true&w=majority&appName=EventWeb

      # Express Session Secret
      - key: SESSION_SECRET
        generateValue: true

      # JWT Secret
      - key: JWT_SECRET
        generateValue: true

      # Google Maps API Key
      - key: GOOGLE_MAPS_API_KEY
        value: YOUR_GOOGLE_MAPS_API_KEY

      # Node Environment
      - key: NODE_ENV
        value: production

      # Backend Port
      - key: PORT
        value: 5000

  # =========================
  # Frontend Service
  # =========================
  - type: web
    name: wbd-eventweb-frontend
    env: docker

    repo: https://github.com/Harshavardhan0909/Event-Management-Platform
    branch: main

    dockerfilePath: ./frontend/Dockerfile

    envVars:
      # Backend API URL
      - key: REACT_APP_API_URL
        value: https://wbd-eventweb-backend.onrender.com

      # Frontend Environment
      - key: NODE_ENV
        value: production
